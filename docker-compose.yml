version: '3.8'
services:
  mrdpstock:
    build: .
    container_name: mrdpstock
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - mrdpstock_data:/app/server/data
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: 
      JWT_EXPIRES_IN: 8h
      DB_PATH: /app/server/data/mrdpstock.db

volumes:
  mrdpstock_data:
